<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Job Hunt Control Center</title>
    <style>
      body { font-family: Arial, sans-serif; margin: 24px; background:#0b1020; color:#e6e9f5; }
      h1 { margin-bottom: 8px; }
      .row { display:flex; gap:10px; flex-wrap:wrap; margin-bottom: 14px; }
      button { background:#4f7cff; color:white; border:none; border-radius:8px; padding:10px 14px; cursor:pointer; }
      button:hover { background:#3f67d5; }
      .card { background:#131a33; border:1px solid #273157; border-radius:10px; padding:14px; margin-bottom:14px; }
      a { color:#8db1ff; }
      pre { background:#0e1430; border:1px solid #2a3769; border-radius:8px; padding:12px; max-height:260px; overflow:auto; white-space:pre-wrap; }
      table { border-collapse: collapse; width:100%; font-size: 12px; }
      th, td { border:1px solid #2a3769; padding:6px; text-align:left; }
      th { background:#1a2450; position: sticky; top:0; }
      .table-wrap { max-height:420px; overflow:auto; }
      .muted { color:#aeb8dc; font-size:13px; }
      input { background:#0e1430; color:#e6e9f5; border:1px solid #2a3769; border-radius:6px; padding:8px; min-width:220px; }
      label { display:flex; flex-direction:column; gap:6px; font-size:13px; color:#c6d0f0; }
    </style>
  </head>
  <body>
    <h1>Job Hunt Control Center</h1>
    <div class="muted">Standalone dashboard: fetch leads, send outreach, view data, run job tracker sync.</div>

    <div class="card">
      <h3>Lead Filters (editable)</h3>
      <div class="row">
        <label>Titles (comma-separated)<input id="titlesInput" placeholder="technical recruiter, engineering recruiter" /></label>
        <label>Countries/Locations<input id="countriesInput" placeholder="United States, Canada" /></label>
      </div>
      <div class="row">
        <label>Include company keywords<input id="companyIncludeInput" placeholder="fintech, healthtech, cloud" /></label>
        <label>Exclude company keywords<input id="companyExcludeInput" placeholder="staffing, consulting" /></label>
      </div>
      <div class="row">
        <label>Target leads<input id="maxResultsInput" type="number" min="1" /></label>
        <label>Apollo per page<input id="perPageInput" type="number" min="1" max="100" /></label>
        <label>Search pages<input id="maxPagesInput" type="number" min="1" /></label>
        <label>Delay ms<input id="delayMsInput" type="number" min="0" /></label>
        <label>Max Apollo match calls<input id="maxApolloMatchesInput" type="number" min="1" /></label>
      </div>
      <div class="row">
        <button id="saveFiltersBtn">Save Filters</button>
      </div>
    </div>

    <div class="card">
      <h3>Actions</h3>
      <div class="row">
        <button id="refreshStatusBtn">Refresh Status</button>
        <button id="fetchBtn">Fetch Emails</button>
        <button id="sendBtn">Send Emails</button>
        <button id="syncBtn">Run Job Tracker Sync</button>
        <a href="#" id="viewDataLink">Open Fetched Data</a>
      </div>
      <div id="status"></div>
    </div>

    <div class="card">
      <h3>Fetched Data Preview (first 500 rows)</h3>
      <div class="table-wrap">
        <table id="dataTable"></table>
      </div>
    </div>

    <div class="card">
      <h3>Command Log</h3>
      <pre id="log">(no logs yet)</pre>
    </div>

    <script src="/app.js"></script>
  </body>
  </html>
